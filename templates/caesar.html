<!DOCTYPE html>
<html lang="en">
<head>
    <title>Caesar Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
    <div class="container mt-4">
        <div class="mb-3">
            <a href="/" class="btn btn-sm btn-outline-secondary">← Quay lại Trang chủ</a>
        </div>

        <table class="table table-bordered shadow-sm">
            <thead class="thead-light">
                <tr>
                    <th style="text-align: center; font-weight: bold; font-size: 25px; color: #333;">CAESAR CIPHER</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="font-weight: bold; color: blue; background-color: #f7f9fa;">ENCRYPTION</td>
                </tr>
                <tr>
                    <td>
                        <form method="POST" action="caesar/encrypt">
                            <div class="mb-3">
                                <label class="form-label font-weight-bold">Plain text:</label>
                                <input type="text" class="form-control" name="inputPlainText" placeholder="Input Plain Text" required autofocus>
                            </div>
                            <div class="mb-3">
                                <label class="form-label font-weight-bold">Key (Số nguyên từ 1 đến 25):</label>
                                <input type="number" class="form-control" name="inputKeyPlain" placeholder="Input Key" min="1" max="25" step="1" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Encrypt</button>
                        </form>
                    </td>
                </tr>

                <tr>
                    <td style="font-weight: bold; color: blue; background-color: #f7f9fa;">DECRYPTION</td>
                </tr>
                <tr>
                    <td>
                        <form method="POST" action="caesar/decrypt">
                            <div class="mb-3">
                                <label class="form-label font-weight-bold">Cipher text:</label>
                                <input type="text" class="form-control" name="inputCipherText" placeholder="Input Cipher Text" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label font-weight-bold">Key (Số nguyên từ 1 đến 25):</label>
                                <input type="number" class="form-control" name="inputKeyCipher" placeholder="Input Key" min="1" max="25" step="1" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Decrypt</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <p style="font-weight: bold; text-align: center; margin-top: 30px; color: #555;">
            Đây là bài của Nguyễn Thanh Hải / 2380600575
        </p>
    </div>
</body>
</html>
