<!DOCTYPE html>
<html lang="en">
<head>
    <title>Rail Fence Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
    <div class="container mt-3">
        <div class="mb-3">
            <a href="/" class="btn btn-secondary btn-sm">Quay lại Trang chủ</a>
        </div>

        <table class="table">
            <tr>
                <td style="text-align: center; font-weight: bold; font-size: 25px;">RAIL FENCE CIPHER</td>
            </tr>

            <tr>
                <td style="font-weight: bold; color: blue;">ENCRYPTION</td>
            </tr>
            <tr>
                <td>
                    <form method="POST" action="/railfence/encrypt">
                        <div class="mb-3">
                            <label class="form-label">Plain text:</label>
                            <input type="text" class="form-control" name="inputPlainText" placeholder="Input Plain Text" value="{{ inputPlainText or '' }}" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Key (Number of rails):</label>
                            <input type="number" class="form-control" name="inputKeyPlain" placeholder="Input Key" min="2" value="{{ inputKeyPlain or '' }}" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Encrypt</button>
                    </form>
                </td>
            </tr>

            <tr>
                <td style="font-weight: bold; color: blue;">DECRYPTION</td>
            </tr>
            <tr>
                <td>
                    <form method="POST" action="/railfence/decrypt">
                        <div class="mb-3">
                            <label class="form-label">Cipher text:</label>
                            <input type="text" class="form-control" name="inputCipherText" placeholder="Input Cipher Text" value="{{ inputCipherText or '' }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Key (Number of rails):</label>
                            <input type="number" class="form-control" name="inputKeyCipher" placeholder="Input Key" min="2" value="{{ inputKeyCipher or '' }}" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Decrypt</button>
                    </form>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
